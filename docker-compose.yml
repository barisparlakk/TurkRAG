services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: turkrag
      POSTGRES_USER: turkrag
      POSTGRES_PASSWORD: turkrag_secret
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]

  api:
    build: ./api
    ports: ["8000:8000"]
    depends_on: [qdrant, postgres]
    environment:
      QDRANT_URL: http://qdrant:6333
      POSTGRES_URL: postgresql://turkrag:turkrag_secret@postgres/turkrag
      JWT_SECRET: change_this_in_production
      LLM_MODEL_PATH: /models/qwen3-8b-instruct-q4_k_m.gguf
      UPLOAD_DIR: /tmp/uploads
      BM25_INDEX_DIR: /app/indexes
    volumes:
      - ./models:/models:ro
      - ./indexes:/app/indexes

  dashboard:
    build: ./dashboard
    ports: ["5173:5173"]
    depends_on: [api]
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  qdrant_data:
  pg_data:
