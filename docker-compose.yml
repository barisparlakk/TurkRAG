services:
  qdrant:
    image: qdrant/qdrant:v1.9.0
    restart: unless-stopped
    ports: ["6333:6333"]
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: turkrag
      POSTGRES_USER: turkrag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turkrag_secret}
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turkrag -d turkrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    ports: ["8001:8001"]
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      POSTGRES_URL: postgresql://turkrag:${POSTGRES_PASSWORD:-turkrag_secret}@postgres/turkrag
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      LLM_MODEL_PATH: /models/qwen3-8b-instruct-q4_k_m.gguf
      LLM_N_GPU_LAYERS: "0"        # CPU-only in Docker; set to -1 for GPU host
      LLM_MAX_TOKENS: "512"
      LLM_N_THREADS: "8"
      UPLOAD_DIR: /tmp/uploads
      BM25_INDEX_DIR: /app/indexes
      HYDE_ENABLED: "true"
    volumes:
      - ./models:/models:ro
      - bm25_indexes:/app/indexes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s   # LLM load takes ~30-60s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
    restart: unless-stopped
    ports: ["5173:5173"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  qdrant_data:
  pg_data:
  bm25_indexes:
